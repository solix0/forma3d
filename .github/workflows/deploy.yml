name: Deploy with Secret Webhook

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Inject webhook from secrets
        run: |
          echo "🔒 Вставляємо webhook з GitHub Secrets..."
          
          # Замінюємо плейсхолдер на реальний webhook у файлі shop.js
          sed -i "s|DISCORD_WEBHOOK_PLACEHOLDER|${{ secrets.DISCORD_WEBHOOK_URL }}|g" shop.js
          
          echo "✅ Webhook успішно вставлено!"
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
